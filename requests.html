<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FINSIGHT LIVE · NEW REQUEST</title>
  <meta name="description" content="Submit a feature idea or bug — no login needed." />
  <link rel="stylesheet" href="styles.css?v=0.4.1" />
  <style>
    /* page-scoped tweaks so it's truly mobile-first */
    body { background: var(--bg); }
    .req-wrap { max-width: 520px; margin: 0 auto; padding: 12px 14px 80px; }
    .req-hero {
      padding: 18px 16px;
      border: 1px solid var(--amber-dim);
      background: linear-gradient(180deg, var(--bg-1) 0%, var(--panel) 100%);
      margin-bottom: 14px;
    }
    .req-hero h2 {
      margin: 0 0 6px; color: var(--amber);
      font-size: 18px; letter-spacing: 2px;
    }
    .req-hero p { margin: 0; color: var(--dim); font-size: 13px; }
    .req-card {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 18px 16px;
      margin-bottom: 14px;
    }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .field label {
      font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--amber); font-weight: 700;
    }
    .field input, .field select, .field textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border-2);
      color: var(--white);
      padding: 12px 14px;
      font-family: var(--mono); font-size: 16px;  /* 16px prevents iOS zoom */
    }
    .field textarea { resize: vertical; min-height: 96px; }
    .field input:focus, .field select:focus, .field textarea:focus {
      outline: none; border-color: var(--amber);
      box-shadow: 0 0 0 2px rgba(255,156,0,0.15);
    }
    .submit-btn {
      width: 100%;
      background: var(--amber); color: #000; border: none;
      padding: 14px; font-family: var(--mono); font-size: 15px;
      font-weight: 700; letter-spacing: 2px; cursor: pointer;
      margin-top: 4px;
    }
    .submit-btn:hover { background: var(--white); }
    .submit-btn:active { transform: translateY(1px); }
    .submit-btn:disabled { opacity: 0.6; cursor: wait; }
    .submit-result {
      margin-top: 14px; padding: 12px 14px;
      font-size: 13px; display: none;
    }
    .submit-result.show { display: block; }
    .submit-result.good { background: rgba(0,230,118,0.08); border: 1px solid var(--green); color: var(--green); }
    .submit-result.err  { background: rgba(255,82,82,0.08); border: 1px solid var(--red); color: var(--red); }
    .submit-result a { color: inherit; text-decoration: underline; }

    .live-feed {
      background: var(--panel); border: 1px solid var(--border);
      padding: 14px 16px; margin-top: 14px;
    }
    .live-feed h3 {
      margin: 0 0 10px; color: var(--amber);
      font-size: 11px; letter-spacing: 1.5px;
    }
    .live-feed .feed-empty { color: var(--dim); font-size: 12px; }
    .live-feed ul { list-style: none; margin: 0; padding: 0; }
    .live-feed li {
      padding: 8px 0; border-bottom: 1px dashed var(--border);
      font-size: 13px; color: var(--white);
      display: flex; gap: 10px; align-items: flex-start;
    }
    .live-feed li:last-child { border-bottom: none; }
    .live-feed .tag {
      flex-shrink: 0; font-size: 10px; padding: 1px 6px;
      border: 1px solid var(--amber-dim); color: var(--amber);
      letter-spacing: 1px; font-weight: 700;
    }
    .live-feed .feed-meta {
      font-size: 11px; color: var(--dim); display: block; margin-top: 2px;
    }

    .presenter-drawer summary {
      display: none;
    }
    .badge {
      display: inline-block; font-size: 10px; padding: 2px 8px;
      letter-spacing: 1px; border: 1px solid;
    }
    .badge.good { color: var(--green); border-color: var(--green); }
    .badge.dim  { color: var(--dim); border-color: var(--border-2); }

    .nav-back {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--dim); font-size: 12px; text-decoration: none;
      margin-bottom: 10px; letter-spacing: 1px;
    }
    .nav-back:hover { color: var(--amber); }

    .ticker { height: 22px; }
    .ticker-track { line-height: 22px; font-size: 11px; }
    @media (max-width: 520px) {
      .req-hero { padding: 14px; }
      .req-card { padding: 14px; }
      .field input, .field select, .field textarea { padding: 11px 12px; }
    }
  </style>
</head>
<body>
  <!-- TICKER (kept slim for mobile) -->
  <div class="ticker" aria-label="Ticker tape">
    <div class="ticker-track" id="ticker-track"></div>
  </div>

  <div class="req-wrap">
    <a class="nav-back" href="index.html">◂ BACK TO TERMINAL</a>

    <!-- HERO -->
    <section class="req-hero">
      <h2>NEW REQUEST</h2>
      <p>Tap submit — no login, no email. Your request appears live on the terminal.</p>
    </section>

    <!-- FORM -->
    <section class="req-card">
      <form id="req-form" novalidate>
        <div class="field">
          <label for="f-title">What should we build?</label>
          <input id="f-title" type="text" required maxlength="120"
                 placeholder="e.g. Add dark mode toggle"
                 autocomplete="off" autocapitalize="sentences" />
        </div>

        <div class="field">
          <label for="f-desc">Tell us more (optional)</label>
          <textarea id="f-desc" maxlength="600"
                    placeholder="Why does this matter? Any specifics?"></textarea>
        </div>

        <div class="field">
          <label for="f-type">Type</label>
          <select id="f-type">
            <option value="Feature">Feature</option>
            <option value="Bug">Bug</option>
            <option value="UI polish">UI polish</option>
            <option value="Idea">Idea</option>
          </select>
        </div>

        <button type="submit" class="submit-btn" id="btn-submit">▶ SUBMIT</button>

        <div class="submit-result" id="result" role="status" aria-live="polite"></div>
      </form>
    </section>

    <!-- LIVE FEED (reads feature-requests.md) -->
    <section class="live-feed" aria-labelledby="feed-title">
      <h3 id="feed-title">LIVE AUDIENCE REQUESTS</h3>
      <div id="feed"><div class="feed-empty">Loading…</div></div>
    </section>
  </div>

  <script src="data.js?v=0.4.1"></script>
  <script src="requests.js?v=0.4.1"></script>
</body>
</html>
